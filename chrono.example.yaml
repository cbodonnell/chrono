server:
  addr: ":8080"

storage:
  data_dir: "./data"

entities:
  sensor:
    retention: "168h" # 7 days - omit to keep forever
    indexes:
      - name: temp
        type: float
      - name: active
        type: bool
      - name: metadata.location
        type: string
      - name: tags
        type: string_array
